name: Wave1 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  wave1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Wave 1 Smoke Test
        run: |
          python tools/wave1_smoke.py

      - name: Run Wave 1 Disk Reload Test
        run: |
          python tools/wave1_reload_test.py

      - name: Run Wave 1 Restart Simulation
        run: |
          python tools/wave1_restart_simulation.py

      - name: Run Health Check (in-process)
        run: |
          python tools/health_check_run.py

      - name: Run Minimal Wave 1 Resume Test (pytest)
        run: |
          pytest backend/tests/test_wave1_resume_minimal.py -q

      - name: Run Wave 2 MVP API Test (pytest)
        run: |
          pytest backend/tests/test_wave2_mvp_api.py -q

      - name: Summary
        run: |
          echo "Wave 1/2 CI completed successfully"
